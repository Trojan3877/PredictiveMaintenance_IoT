version: "3.8"

services:
  api:
    build: .
    container_name: predictive_api
    ports:
      - "8000:8000"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: predictive_dashboard
    ports:
      - "8501:8501"
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
